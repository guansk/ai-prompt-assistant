<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team Prompt Manager</title>
  <link rel="stylesheet" href="styles/popup.css">
  <script src="libs/lucide.min.js"></script>
</head>
<body>
  <div class="container">
    <header class="header">
      <h1 class="title">我的提示词</h1>
      <div class="header-actions">
        <button class="btn-icon btn-search" id="searchBtn" title="搜索">
          <i data-lucide="search"></i>
        </button>
        <button class="btn-icon btn-refresh" id="refreshBtn" title="刷新">
          <i data-lucide="refresh-cw"></i>
        </button>
        <button class="btn-icon btn-settings" id="settingsBtn" title="设置">
          <i data-lucide="settings"></i>
        </button>
      </div>
    </header>

    <div class="search-box" id="searchBox" style="display: none;">
      <i data-lucide="search" class="search-icon"></i>
      <input type="text" id="searchInput" placeholder="搜索提示词..." />
      <button class="btn-icon btn-close-search" id="closeSearchBtn" title="关闭搜索">
        <i data-lucide="x"></i>
      </button>
    </div>

    <div id="content">
      <!-- 未配置状态 -->
      <div id="unconfigured" class="state-view" style="display: none;">
        <div class="empty-state">
          <i data-lucide="alert-circle" class="empty-icon warning"></i>
          <p class="empty-title">还未配置</p>
          <p class="empty-desc">需要先连接飞书多维表</p>
          <button class="btn-primary" id="goSettingsBtn">去设置</button>
        </div>
      </div>

      <!-- 加载状态 -->
      <div id="loading" class="state-view" style="display: none;">
        <div class="loading-skeleton">
          <div class="skeleton-item"></div>
          <div class="skeleton-item"></div>
          <div class="skeleton-item"></div>
        </div>
      </div>

      <!-- 错误状态 -->
      <div id="error" class="state-view" style="display: none;">
        <div class="empty-state">
          <i data-lucide="x-circle" class="empty-icon error"></i>
          <p class="empty-title">加载失败</p>
          <p class="empty-desc" id="errorMessage">请检查网络连接或配置信息</p>
          <button class="btn-secondary" id="retryBtn">重试</button>
        </div>
      </div>

      <!-- Prompt 列表 -->
      <div id="promptList" class="prompt-list"></div>

      <!-- 空状态 -->
      <div id="empty" class="state-view" style="display: none;">
        <div class="empty-state">
          <i data-lucide="file-text" class="empty-icon"></i>
          <p class="empty-title">还没有提示词</p>
          <p class="empty-desc">在飞书多维表中添加后即可使用</p>
        </div>
      </div>

      <!-- 变量填充表单 -->
      <div id="variableForm" class="variable-form" style="display: none;">
        <div class="form-header">
          <button class="btn-back" id="cancelFormBtn" title="返回">
            <i data-lucide="arrow-left"></i>
          </button>
          <h2 class="form-title" id="formTitle">填写参数</h2>
          <button class="btn-text btn-clear-cache" id="clearCacheBtn" title="清空已填写的内容">
            <i data-lucide="trash-2"></i>
          </button>
        </div>
        <div class="form-body">
          <div id="formFields" class="form-fields"></div>
        </div>
        <div class="form-footer">
          <button class="btn-primary btn-submit" id="confirmFillBtn">
            <i data-lucide="send"></i>
            <span>生成并填入</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
  <script>
    // 初始化 Lucide 图标
    lucide.createIcons();
  </script>
</body>
</html>
