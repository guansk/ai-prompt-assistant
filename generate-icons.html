<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图标生成器</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f5f5f5;
      padding: 20px;
    }
    .container {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      text-align: center;
    }
    h1 {
      color: #333;
      margin-bottom: 30px;
    }
    .icons {
      display: flex;
      gap: 30px;
      margin: 30px 0;
      justify-content: center;
    }
    .icon-item {
      text-align: center;
    }
    canvas {
      border: 1px solid #ddd;
      border-radius: 8px;
      margin-bottom: 10px;
    }
    button {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      margin-top: 10px;
    }
    button:hover {
      background: #2563eb;
    }
    .info {
      color: #666;
      font-size: 14px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Team Prompt Manager 图标生成器</h1>
    <p>点击下载按钮保存图标到 icons 目录</p>
    
    <div class="icons">
      <div class="icon-item">
        <canvas id="icon16" width="16" height="16"></canvas>
        <div>16x16</div>
        <button onclick="downloadIcon('icon16', 16)">下载</button>
      </div>
      <div class="icon-item">
        <canvas id="icon48" width="48" height="48"></canvas>
        <div>48x48</div>
        <button onclick="downloadIcon('icon48', 48)">下载</button>
      </div>
      <div class="icon-item">
        <canvas id="icon128" width="128" height="128"></canvas>
        <div>128x128</div>
        <button onclick="downloadIcon('icon128', 128)">下载</button>
      </div>
    </div>
    
    <p class="info">图标设计：对话气泡 + 团队协作元素</p>
  </div>

  <script>
    function drawIcon(canvasId, size) {
      const canvas = document.getElementById(canvasId);
      const ctx = canvas.getContext('2d');
      
      // 清空画布
      ctx.clearRect(0, 0, size, size);
      
      // 背景渐变
      const gradient = ctx.createLinearGradient(0, 0, size, size);
      gradient.addColorStop(0, '#3b82f6');
      gradient.addColorStop(1, '#2563eb');
      
      // 圆角矩形背景
      const radius = size * 0.2;
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.roundRect(0, 0, size, size, radius);
      ctx.fill();
      
      // 对话气泡
      ctx.fillStyle = 'white';
      const bubbleSize = size * 0.5;
      const bubbleX = size * 0.25;
      const bubbleY = size * 0.2;
      
      // 主气泡
      ctx.beginPath();
      ctx.roundRect(bubbleX, bubbleY, bubbleSize, bubbleSize * 0.7, size * 0.08);
      ctx.fill();
      
      // 气泡尾巴
      ctx.beginPath();
      ctx.moveTo(bubbleX + bubbleSize * 0.2, bubbleY + bubbleSize * 0.7);
      ctx.lineTo(bubbleX + bubbleSize * 0.15, bubbleY + bubbleSize * 0.9);
      ctx.lineTo(bubbleX + bubbleSize * 0.35, bubbleY + bubbleSize * 0.7);
      ctx.fill();
      
      // 文字线条
      ctx.strokeStyle = '#3b82f6';
      ctx.lineWidth = size * 0.02;
      ctx.lineCap = 'round';
      
      const lineY1 = bubbleY + bubbleSize * 0.25;
      const lineY2 = bubbleY + bubbleSize * 0.45;
      const lineStartX = bubbleX + bubbleSize * 0.15;
      const lineEndX = bubbleX + bubbleSize * 0.85;
      
      ctx.beginPath();
      ctx.moveTo(lineStartX, lineY1);
      ctx.lineTo(lineEndX, lineY1);
      ctx.stroke();
      
      ctx.beginPath();
      ctx.moveTo(lineStartX, lineY2);
      ctx.lineTo(lineEndX * 0.9, lineY2);
      ctx.stroke();
    }

    function downloadIcon(canvasId, size) {
      const canvas = document.getElementById(canvasId);
      const link = document.createElement('a');
      link.download = `icon${size}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    // 绘制所有图标
    drawIcon('icon16', 16);
    drawIcon('icon48', 48);
    drawIcon('icon128', 128);
  </script>
</body>
</html>
