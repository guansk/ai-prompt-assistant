<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景渐变 -->
  <defs>
    <linearGradient id="bg-gradient" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
  </defs>
  
  <!-- 圆角矩形背景 -->
  <rect width="128" height="128" rx="24" fill="url(#bg-gradient)"/>
  
  <!-- 对话气泡 -->
  <g>
    <!-- 主气泡 -->
    <rect x="32" y="26" width="64" height="45" rx="10" fill="white"/>
    
    <!-- 气泡尾巴 -->
    <path d="M 45 71 L 40 85 L 55 71 Z" fill="white"/>
    
    <!-- 文字线条 -->
    <line x1="42" y1="40" x2="86" y2="40" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>
    <line x1="42" y1="52" x2="76" y2="52" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>
  </g>
  
  <!-- 团队图标（三个小圆点） -->
  <g>
    <circle cx="50" cy="100" r="6" fill="white" opacity="0.9"/>
    <circle cx="64" cy="100" r="6" fill="white" opacity="0.9"/>
    <circle cx="78" cy="100" r="6" fill="white" opacity="0.9"/>
  </g>
</svg>
