<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>飞书 API 测试工具</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
      background: #f5f5f5;
    }
    .container {
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 {
      color: #333;
      margin-bottom: 20px;
    }
    .form-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: 500;
      color: #555;
    }
    input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
    }
    button {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      margin-right: 10px;
    }
    button:hover {
      background: #2563eb;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    #result {
      margin-top: 20px;
      padding: 15px;
      background: #f9f9f9;
      border-radius: 4px;
      white-space: pre-wrap;
      font-family: monospace;
      font-size: 12px;
      max-height: 400px;
      overflow-y: auto;
    }
    .success {
      color: #059669;
      background: #d1fae5;
    }
    .error {
      color: #dc2626;
      background: #fee2e2;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔧 飞书 API 测试工具</h1>
    <p style="color: #666; margin-bottom: 20px;">
      此工具用于测试飞书 API 连接，帮助排查配置问题。
    </p>

    <div class="form-group">
      <label>App ID</label>
      <input type="text" id="appId" placeholder="cli_xxxxxxxxxxxxxxxx">
    </div>

    <div class="form-group">
      <label>App Secret</label>
      <input type="password" id="appSecret" placeholder="请输入 App Secret">
    </div>

    <div class="form-group">
      <label>App Token (可选，用于测试多维表)</label>
      <input type="text" id="appToken" placeholder="bascnxxxxxxxxxxxxxxxx">
    </div>

    <div class="form-group">
      <label>Table ID (可选，用于测试多维表)</label>
      <input type="text" id="tableId" placeholder="tblxxxxxxxxxxxxxxxx">
    </div>

    <button onclick="testToken()">测试获取 Token</button>
    <button onclick="testTable()">测试读取多维表</button>
    <button onclick="clearResult()">清除结果</button>

    <div id="result"></div>
  </div>

  <script>
    function log(message, type = 'info') {
      const result = document.getElementById('result');
      const timestamp = new Date().toLocaleTimeString();
      result.textContent += `[${timestamp}] ${message}\n`;
      if (type === 'error') {
        result.className = 'error';
      } else if (type === 'success') {
        result.className = 'success';
      }
      result.scrollTop = result.scrollHeight;
    }

    function clearResult() {
      document.getElementById('result').textContent = '';
      document.getElementById('result').className = '';
    }

    async function testToken() {
      clearResult();
      
      const appId = document.getElementById('appId').value.trim();
      const appSecret = document.getElementById('appSecret').value.trim();

      if (!appId || !appSecret) {
        log('请填写 App ID 和 App Secret', 'error');
        return;
      }

      log('开始测试...');
      log(`App ID: ${appId}`);
      log(`App Secret: ${appSecret.substring(0, 10)}...`);
      log('');

      const domains = [
        'https://open.feishu.cn',
        'https://open.larksuite.com'
      ];

      for (const domain of domains) {
        log(`\n尝试连接: ${domain}`);
        
        try {
          const url = `${domain}/open-api/auth/v3/tenant_access_token/internal`;
          log(`请求 URL: ${url}`);
          
          const response = await fetch(url, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              app_id: appId,
              app_secret: appSecret
            })
          });

          log(`HTTP 状态: ${response.status} ${response.statusText}`);

          const text = await response.text();
          log(`响应内容: ${text}`);

          try {
            const data = JSON.parse(text);
            log(`解析后的 JSON:`);
            log(JSON.stringify(data, null, 2));

            if (data.code === 0) {
              log(`\n✓ 成功！Token: ${data.tenant_access_token.substring(0, 20)}...`, 'success');
              
              // 保存 token 供测试多维表使用
              window.testToken = data.tenant_access_token;
              window.testDomain = domain;
              return;
            } else {
              log(`\n✗ 失败！错误码: ${data.code}, 错误信息: ${data.msg}`, 'error');
            }
          } catch (e) {
            log(`\n✗ JSON 解析失败: ${e.message}`, 'error');
          }
        } catch (e) {
          log(`\n✗ 请求失败: ${e.message}`, 'error');
        }
      }

      log('\n所有域名都测试失败', 'error');
    }

    async function testTable() {
      if (!window.testToken) {
        log('请先测试获取 Token', 'error');
        return;
      }

      const appToken = document.getElementById('appToken').value.trim();
      const tableId = document.getElementById('tableId').value.trim();

      if (!appToken || !tableId) {
        log('请填写 App Token 和 Table ID', 'error');
        return;
      }

      log('\n\n开始测试多维表...');
      log(`App Token: ${appToken}`);
      log(`Table ID: ${tableId}`);

      try {
        const url = `${window.testDomain}/open-api/bitable/v1/apps/${appToken}/tables/${tableId}/records?page_size=1`;
        log(`请求 URL: ${url}`);

        const response = await fetch(url, {
          headers: {
            'Authorization': `Bearer ${window.testToken}`
          }
        });

        log(`HTTP 状态: ${response.status} ${response.statusText}`);

        const text = await response.text();
        log(`响应内容: ${text.substring(0, 500)}...`);

        const data = JSON.parse(text);
        log(`解析后的 JSON:`);
        log(JSON.stringify(data, null, 2));

        if (data.code === 0) {
          log(`\n✓ 成功读取多维表！`, 'success');
          log(`记录数: ${data.data?.items?.length || 0}`);
        } else {
          log(`\n✗ 失败！错误码: ${data.code}, 错误信息: ${data.msg}`, 'error');
        }
      } catch (e) {
        log(`\n✗ 请求失败: ${e.message}`, 'error');
      }
    }
  </script>
</body>
</html>
